<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<meta name="theme-color" content="#2c7a7b">
<title>ספר המתכונים שלי</title>
<style>
/* ===== CSS Variables ===== */
:root {
  --teal-dark: #234e52;
  --teal: #2c7a7b;
  --teal-light: #319795;
  --teal-soft: #b2f5ea;
  --teal-bg: #e6fffa;
  --white: #ffffff;
  --bg: #f7fafc;
  --card-bg: #ffffff;
  --text: #1a202c;
  --text-light: #4a5568;
  --text-muted: #718096;
  --border: #e2e8f0;
  --danger: #c53030;
  --danger-light: #fed7d7;
  --shadow: 0 2px 8px rgba(0,0,0,0.08);
  --shadow-lg: 0 10px 30px rgba(0,0,0,0.15);
  --radius: 12px;
  --radius-sm: 8px;
}

/* ===== Reset ===== */
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Heebo", "Assistant", "Arial Hebrew", "David", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, textarea, select { font-family: inherit; font-size: 1rem; }

/* ===== Header ===== */
header {
  background: linear-gradient(135deg, var(--teal-dark), var(--teal));
  color: var(--white);
  padding: 16px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: var(--shadow);
}
.header-top { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.app-title { font-size: 1.3rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
.icon-btn {
  width: 40px; height: 40px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: var(--white); transition: background 0.2s;
}
.icon-btn:hover, .icon-btn:active { background: rgba(255,255,255,0.15); }
.icon-btn svg { width: 22px; height: 22px; }
.search-box {
  margin-top: 12px; position: relative;
}
.search-box input {
  width: 100%; padding: 10px 40px 10px 12px;
  border-radius: var(--radius-sm);
  border: none; outline: none;
  background: rgba(255,255,255,0.95);
  color: var(--text);
}
.search-box::before {
  content: ''; position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
  width: 18px; height: 18px;
  background: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23718096' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><circle cx='11' cy='11' r='8'/><line x1='21' y1='21' x2='16.65' y2='16.65'/></svg>") no-repeat center;
  pointer-events: none;
}

/* ===== Category Tabs ===== */
.tabs {
  background: var(--white); padding: 10px 12px;
  display: flex; gap: 8px; overflow-x: auto;
  border-bottom: 1px solid var(--border);
  scrollbar-width: thin;
}
.tabs::-webkit-scrollbar { height: 4px; }
.tabs::-webkit-scrollbar-thumb { background: var(--teal-soft); border-radius: 2px; }
.tab {
  padding: 8px 16px; border-radius: 20px;
  background: var(--bg); color: var(--text-light);
  white-space: nowrap; font-size: 0.95rem; font-weight: 500;
  transition: all 0.2s; border: 1px solid transparent;
}
.tab:hover { background: var(--teal-bg); }
.tab.active {
  background: var(--teal); color: var(--white);
}
.tab.favorites-tab.active { background: var(--teal-dark); }

/* ===== Main Content ===== */
main {
  padding: 16px;
  max-width: 1200px;
  margin: 0 auto;
  padding-bottom: 100px;
}

/* ===== Recipe Grid ===== */
.recipe-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 16px;
}
@media (max-width: 500px) {
  .recipe-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
}
.recipe-card {
  background: var(--card-bg);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow);
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  position: relative;
}
.recipe-card:hover, .recipe-card:active {
  transform: translateY(-2px);
  box-shadow: var(--shadow-lg);
}
.recipe-img {
  width: 100%; aspect-ratio: 4/3;
  background: linear-gradient(135deg, var(--teal-soft), var(--teal-bg));
  object-fit: cover; display: block;
}
.recipe-img-placeholder {
  width: 100%; aspect-ratio: 4/3;
  background: linear-gradient(135deg, var(--teal-soft), var(--teal-bg));
  display: flex; align-items: center; justify-content: center;
  color: var(--teal); font-size: 3rem;
}
.recipe-info { padding: 12px; }
.recipe-name {
  font-weight: 600; font-size: 1rem;
  margin-bottom: 6px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  min-height: 2.8em;
}
.recipe-times {
  font-size: 0.8rem; color: var(--text-muted);
  display: flex; gap: 10px; flex-wrap: wrap;
}
.recipe-fav-badge {
  position: absolute; top: 8px; left: 8px;
  background: rgba(255,255,255,0.95);
  border-radius: 50%;
  width: 34px; height: 34px;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 6px rgba(0,0,0,0.15);
}
.recipe-fav-badge svg { width: 18px; height: 18px; fill: var(--teal); }

/* ===== Empty State ===== */
.empty-state {
  text-align: center; padding: 60px 20px;
  color: var(--text-muted);
}
.empty-state .emoji { font-size: 4rem; margin-bottom: 16px; }
.empty-state h2 { color: var(--text); font-size: 1.3rem; margin-bottom: 8px; }
.empty-state p { margin-bottom: 20px; }

/* ===== Buttons ===== */
.btn {
  padding: 10px 20px; border-radius: var(--radius-sm);
  font-weight: 600; font-size: 0.95rem;
  transition: all 0.2s;
  display: inline-flex; align-items: center; justify-content: center;
  gap: 6px;
}
.btn-primary { background: var(--teal); color: var(--white); }
.btn-primary:hover { background: var(--teal-light); }
.btn-secondary { background: var(--bg); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { background: var(--teal-bg); }
.btn-danger { background: var(--danger); color: var(--white); }
.btn-danger:hover { opacity: 0.9; }

/* ===== FAB ===== */
.fab {
  position: fixed; bottom: 20px; left: 20px;
  width: 56px; height: 56px; border-radius: 50%;
  background: var(--teal); color: var(--white);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 12px rgba(44,122,123,0.4);
  z-index: 50;
  transition: transform 0.2s;
}
.fab:hover, .fab:active { transform: scale(1.05); }
.fab svg { width: 28px; height: 28px; }

/* ===== Modal ===== */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.5);
  display: none;
  align-items: center; justify-content: center;
  z-index: 200; padding: 16px;
  overflow-y: auto;
}
.modal-overlay.active { display: flex; }
.modal {
  background: var(--white);
  border-radius: var(--radius);
  max-width: 600px; width: 100%;
  max-height: 90vh;
  display: flex; flex-direction: column;
  overflow: hidden;
  box-shadow: var(--shadow-lg);
}
.modal-header {
  padding: 16px; border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
  background: var(--teal); color: var(--white);
}
.modal-header h2 { font-size: 1.2rem; font-weight: 600; }
.modal-header .icon-btn { color: var(--white); }
.modal-body { padding: 20px; overflow-y: auto; flex: 1; }
.modal-footer {
  padding: 16px; border-top: 1px solid var(--border);
  display: flex; gap: 10px; justify-content: flex-start;
  background: var(--bg);
}

/* ===== Fullscreen Modal (for Recipe Detail) ===== */
.modal-overlay.fullscreen {
  padding: 0;
  background: var(--white);
}
.modal-overlay.fullscreen .modal {
  max-width: 100%;
  width: 100%;
  max-height: 100vh;
  height: 100vh;
  border-radius: 0;
  box-shadow: none;
}

/* ===== Form ===== */
.form-group { margin-bottom: 16px; }
.form-group label {
  display: block; font-weight: 600; font-size: 0.9rem;
  margin-bottom: 6px; color: var(--text-light);
}
.form-group input, .form-group textarea, .form-group select {
  width: 100%; padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--white);
  outline: none;
  transition: border-color 0.2s;
}
.form-group input:focus, .form-group textarea:focus, .form-group select:focus {
  border-color: var(--teal);
  box-shadow: 0 0 0 3px rgba(44,122,123,0.1);
}
.form-group textarea { resize: vertical; min-height: 100px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
@media (max-width: 500px) { .form-row { grid-template-columns: 1fr; } }

.photo-upload {
  position: relative; width: 100%;
  aspect-ratio: 4/3;
  background: var(--teal-bg);
  border: 2px dashed var(--teal-light);
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  overflow: hidden;
}
.photo-upload input { display: none; }
.photo-upload img { width: 100%; height: 100%; object-fit: cover; }
.photo-upload .placeholder {
  text-align: center; color: var(--teal);
}
.photo-upload .placeholder .emoji { font-size: 3rem; }
.photo-remove {
  position: absolute; top: 8px; left: 8px;
  background: var(--danger); color: var(--white);
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  box-shadow: var(--shadow);
}

.checkbox-group {
  display: flex; align-items: center; gap: 10px;
  padding: 10px; background: var(--bg);
  border-radius: var(--radius-sm); cursor: pointer;
}
.checkbox-group input { width: 20px; height: 20px; accent-color: var(--teal); }
.checkbox-group label { margin: 0; cursor: pointer; }

/* ===== Recipe Detail ===== */
.detail-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 16px; background: var(--teal); color: var(--white);
  position: sticky; top: 0; z-index: 10;
}
.detail-header .actions { display: flex; gap: 4px; }
.detail-body { padding: 0; }
.detail-img {
  width: 100%;
  max-height: 50vh;
  object-fit: cover;
  background: linear-gradient(135deg, var(--teal-soft), var(--teal-bg));
  display: block;
}
.detail-img-placeholder {
  width: 100%; aspect-ratio: 16/10;
  background: linear-gradient(135deg, var(--teal-soft), var(--teal-bg));
  display: flex; align-items: center; justify-content: center;
  font-size: 5rem; color: var(--teal);
}
.detail-content {
  padding: 24px;
  max-width: 900px;
  margin: 0 auto;
}
.detail-title {
  font-size: 1.8rem; font-weight: 700;
  color: var(--teal-dark);
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
}
@media (max-width: 500px) {
  .detail-title { font-size: 1.5rem; }
  .detail-content { padding: 20px 16px; }
}
.fav-star { color: var(--teal); font-size: 1.5rem; }
.detail-meta {
  display: flex; gap: 16px; flex-wrap: wrap;
  margin: 16px 0 24px;
  padding: 14px; background: var(--teal-bg);
  border-radius: var(--radius-sm);
  color: var(--teal-dark); font-size: 0.95rem;
}
.detail-meta span { display: inline-flex; align-items: center; gap: 6px; }
.detail-section { margin-bottom: 28px; }
.detail-section h3 {
  font-size: 1.2rem; color: var(--teal-dark);
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 2px solid var(--teal-soft);
}
.detail-section .content {
  white-space: pre-wrap;
  line-height: 1.8;
  color: var(--text);
  font-size: 1.05rem;
}

/* ===== Settings Menu ===== */
.menu-items { display: flex; flex-direction: column; }
.menu-item {
  padding: 14px 16px; text-align: right;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px;
  transition: background 0.2s; width: 100%;
}
.menu-item:last-child { border-bottom: none; }
.menu-item:hover { background: var(--teal-bg); }
.menu-item svg { width: 22px; height: 22px; color: var(--teal); flex-shrink: 0; }
.menu-item.danger { color: var(--danger); }
.menu-item.danger svg { color: var(--danger); }

/* ===== Category Manager ===== */
.cat-list { display: flex; flex-direction: column; gap: 8px; }
.cat-item {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 12px; background: var(--bg);
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
}
.cat-item .cat-name { flex: 1; font-weight: 500; }
.cat-item .cat-count { color: var(--text-muted); font-size: 0.85rem; }
.cat-item .cat-actions { display: flex; gap: 4px; }
.cat-item .mini-btn {
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-light); transition: background 0.2s;
}
.cat-item .mini-btn:hover { background: var(--teal-bg); color: var(--teal); }
.cat-item .mini-btn.danger:hover { background: var(--danger-light); color: var(--danger); }
.cat-item .mini-btn svg { width: 18px; height: 18px; }
.cat-item .mini-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.add-cat-form { display: flex; gap: 8px; margin-top: 12px; }
.add-cat-form input { flex: 1; }

/* ===== Confirm Dialog ===== */
.confirm-modal { max-width: 400px; }
.confirm-body { padding: 24px 20px; text-align: center; }
.confirm-body .emoji { font-size: 3rem; margin-bottom: 12px; }
.confirm-body h3 { color: var(--text); font-size: 1.2rem; margin-bottom: 8px; }
.confirm-body p { color: var(--text-light); }

/* ===== Toast ===== */
.toast {
  position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
  background: var(--teal-dark); color: var(--white);
  padding: 12px 20px; border-radius: var(--radius);
  box-shadow: var(--shadow-lg);
  z-index: 300; opacity: 0;
  transition: opacity 0.3s, transform 0.3s;
  pointer-events: none;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(-10px); }

/* ===== Utility ===== */
.hidden { display: none !important; }

/* ===== Print ===== */
@media print {
  header, .tabs, .fab, .detail-header, .toast { display: none !important; }
  body { background: white; }
  main { padding: 0; }
  .detail-img { max-height: 300px; }
  .detail-section { page-break-inside: avoid; }
}

/* ===== Scrollbars ===== */
.modal-body::-webkit-scrollbar { width: 6px; }
.modal-body::-webkit-scrollbar-thumb { background: var(--teal-soft); border-radius: 3px; }
</style>
</head>
<body>

<!-- ===== Header ===== -->
<header>
  <div class="header-top">
    <div class="app-title">
      <span>📖</span>
      <span>ספר המתכונים שלי</span>
    </div>
    <button class="icon-btn" id="btnMenu" aria-label="תפריט">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg>
    </button>
  </div>
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="חיפוש מתכון...">
  </div>
</header>

<!-- ===== Category Tabs ===== -->
<div class="tabs" id="tabs"></div>

<!-- ===== Main Content ===== -->
<main id="main"></main>

<!-- ===== FAB: Add Recipe ===== -->
<button class="fab" id="btnAddRecipe" aria-label="הוסף מתכון">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
</button>

<!-- ===== Modal: Recipe Form ===== -->
<div class="modal-overlay" id="modalRecipeForm">
  <div class="modal">
    <div class="modal-header">
      <h2 id="recipeFormTitle">מתכון חדש</h2>
      <button class="icon-btn" data-close>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>תמונה</label>
        <label class="photo-upload" id="photoUpload">
          <input type="file" id="photoInput" accept="image/*">
          <div class="placeholder" id="photoPlaceholder">
            <div class="emoji">📷</div>
            <div>הוספת תמונה</div>
          </div>
          <img id="photoPreview" class="hidden" alt="">
          <button type="button" class="photo-remove hidden" id="photoRemove" aria-label="מחק תמונה">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </label>
      </div>
      <div class="form-group">
        <label>שם המתכון *</label>
        <input type="text" id="inputName" required>
      </div>
      <div class="form-group">
        <label>פרק *</label>
        <select id="inputCategory" required></select>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>זמן הכנה</label>
          <input type="text" id="inputPrepTime" placeholder="לדוגמה: 20 דקות">
        </div>
        <div class="form-group">
          <label>זמן בישול/אפייה</label>
          <input type="text" id="inputCookTime" placeholder="לדוגמה: 45 דקות">
        </div>
      </div>
      <div class="form-group">
        <label>כמות מנות</label>
        <input type="text" id="inputServings" placeholder="לדוגמה: 6 מנות">
      </div>
      <div class="form-group">
        <label>מצרכים</label>
        <textarea id="inputIngredients" placeholder="שורה לכל מצרך..."></textarea>
      </div>
      <div class="form-group">
        <label>אופן הכנה</label>
        <textarea id="inputInstructions" placeholder="שלבי ההכנה..."></textarea>
      </div>
      <div class="form-group">
        <label>הערות</label>
        <textarea id="inputNotes" placeholder="הערות, טיפים, שינויים..."></textarea>
      </div>
      <label class="checkbox-group">
        <input type="checkbox" id="inputFavorite">
        <label for="inputFavorite">⭐ סמן כמועדף</label>
      </label>
    </div>
    <div class="modal-footer">
      <button class="btn btn-primary" id="btnSaveRecipe">שמירה</button>
      <button class="btn btn-secondary" data-close>ביטול</button>
    </div>
  </div>
</div>

<!-- ===== Modal: Recipe Detail (FULLSCREEN) ===== -->
<div class="modal-overlay fullscreen" id="modalRecipeDetail">
  <div class="modal">
    <div class="detail-header">
      <button class="icon-btn" data-close aria-label="חזרה">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div class="actions">
        <button class="icon-btn" id="btnEditRecipe" aria-label="עריכה">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
        <button class="icon-btn" id="btnPrintRecipe" aria-label="הדפסה">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
        </button>
        <button class="icon-btn" id="btnShareRecipe" aria-label="שיתוף">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
        </button>
        <button class="icon-btn" id="btnDeleteRecipe" aria-label="מחיקה">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
        </button>
      </div>
    </div>
    <div class="modal-body" style="padding:0" id="detailBody"></div>
  </div>
</div>

<!-- ===== Modal: Settings Menu ===== -->

<!-- ===== Toast ===== -->
<div class="toast" id="toast"></div>

<script>
// ===== Storage =====
const STORAGE_KEY = 'recipeBookData_v1';

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return { version: 1, categories: [], recipes: [] };
    const data = JSON.parse(raw);
    if (!data.categories) data.categories = [];
    if (!data.recipes) data.recipes = [];
    return data;
  } catch (e) {
    console.error('Load error:', e);
    return { version: 1, categories: [], recipes: [] };
  }
}

function saveData() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state.data));
  } catch (e) {
    console.error('Save error:', e);
    showToast('שגיאה בשמירה - אולי אין מקום באחסון');
  }
}

// ===== State =====
const state = {
  data: loadData(),
  currentFilter: 'all', // 'all' | 'favorites' | categoryId
  searchTerm: '',
  editingRecipeId: null,
  currentPhotoData: null,
  viewingRecipeId: null,
  confirmCallback: null
};

// ===== Utilities =====
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }
function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function openModal(id) { document.getElementById(id).classList.add('active'); }
function closeModal(id) { document.getElementById(id).classList.remove('active'); }
function closeAllModals() { document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('active')); }

// ===== Image Resize =====
async function resizeImage(file, maxSize = 900, quality = 0.78) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const ratio = Math.min(maxSize / img.width, maxSize / img.height, 1);
        const canvas = document.createElement('canvas');
        canvas.width = Math.round(img.width * ratio);
        canvas.height = Math.round(img.height * ratio);
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// ===== Render: Tabs =====
function renderTabs() {
  const tabs = document.getElementById('tabs');
  let html = `<button class="tab ${state.currentFilter === 'all' ? 'active' : ''}" data-filter="all">הכל</button>`;
  html += `<button class="tab favorites-tab ${state.currentFilter === 'favorites' ? 'active' : ''}" data-filter="favorites">⭐ מועדפים</button>`;
  state.data.categories.forEach(cat => {
    html += `<button class="tab ${state.currentFilter === cat.id ? 'active' : ''}" data-filter="${cat.id}">${escapeHtml(cat.name)}</button>`;
  });
  tabs.innerHTML = html;
  tabs.querySelectorAll('.tab').forEach(btn => {
    btn.onclick = () => {
      state.currentFilter = btn.dataset.filter;
      renderTabs();
      renderRecipes();
    };
  });
}

// ===== Render: Recipes =====
function getFilteredRecipes() {
  let recipes = [...state.data.recipes];
  if (state.currentFilter === 'favorites') {
    recipes = recipes.filter(r => r.favorite);
  } else if (state.currentFilter !== 'all') {
    recipes = recipes.filter(r => r.categoryId === state.currentFilter);
  }
  if (state.searchTerm) {
    const q = state.searchTerm.toLowerCase();
    recipes = recipes.filter(r =>
      (r.name || '').toLowerCase().includes(q) ||
      (r.ingredients || '').toLowerCase().includes(q) ||
      (r.instructions || '').toLowerCase().includes(q) ||
      (r.notes || '').toLowerCase().includes(q)
    );
  }
  return recipes;
}

function renderRecipes() {
  const main = document.getElementById('main');

  if (state.data.categories.length === 0) {
    main.innerHTML = `
      <div class="empty-state">
        <div class="emoji">📚</div>
        <h2>ברוכה הבאה לספר המתכונים שלך!</h2>
        <p>כדי להתחיל, הוסיפי פרק ראשון (למשל: עוגות, מרקים, סלטים...)</p>
        <button class="btn btn-primary" onclick="openCategoryManager()">יצירת פרק ראשון</button>
      </div>`;
    return;
  }

  const recipes = getFilteredRecipes();

  if (recipes.length === 0) {
    let msg = 'אין מתכונים עדיין';
    let emoji = '🍳';
    if (state.searchTerm) { msg = 'לא נמצאו מתכונים לחיפוש זה'; emoji = '🔍'; }
    else if (state.currentFilter === 'favorites') { msg = 'עדיין אין מתכונים מועדפים'; emoji = '⭐'; }
    main.innerHTML = `
      <div class="empty-state">
        <div class="emoji">${emoji}</div>
        <h2>${msg}</h2>
        ${!state.searchTerm ? '<p>הוסיפי מתכון חדש באמצעות הכפתור (+)</p>' : ''}
      </div>`;
    return;
  }

  let html = '<div class="recipe-grid">';
  recipes.forEach(r => {
    const img = r.image
      ? `<img class="recipe-img" src="${r.image}" alt="${escapeHtml(r.name)}">`
      : `<div class="recipe-img-placeholder">🍽️</div>`;
    const timesParts = [];
    if (r.prepTime) timesParts.push(`⏱️ ${escapeHtml(r.prepTime)}`);
    if (r.cookTime) timesParts.push(`🔥 ${escapeHtml(r.cookTime)}`);
    const times = timesParts.length ? `<div class="recipe-times">${timesParts.join(' · ')}</div>` : '';
    const favBadge = r.favorite ? `
      <div class="recipe-fav-badge">
        <svg viewBox="0 0 24 24"><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/></svg>
      </div>` : '';
    html += `
      <div class="recipe-card" data-id="${r.id}">
        ${favBadge}
        ${img}
        <div class="recipe-info">
          <div class="recipe-name">${escapeHtml(r.name)}</div>
          ${times}
        </div>
      </div>`;
  });
  html += '</div>';
  main.innerHTML = html;

  main.querySelectorAll('.recipe-card').forEach(card => {
    card.onclick = () => showRecipeDetail(card.dataset.id);
  });
}

// ===== Recipe Detail =====
function showRecipeDetail(id) {
  const r = state.data.recipes.find(x => x.id === id);
  if (!r) return;
  state.viewingRecipeId = id;

  const img = r.image
    ? `<img class="detail-img" src="${r.image}" alt="">`
    : `<div class="detail-img-placeholder">🍽️</div>`;
  const cat = state.data.categories.find(c => c.id === r.categoryId);
  const meta = [];
  if (cat) meta.push(`<span>📁 ${escapeHtml(cat.name)}</span>`);
  if (r.prepTime) meta.push(`<span>⏱️ הכנה: ${escapeHtml(r.prepTime)}</span>`);
  if (r.cookTime) meta.push(`<span>🔥 בישול: ${escapeHtml(r.cookTime)}</span>`);
  if (r.servings) meta.push(`<span>🍽️ ${escapeHtml(r.servings)}</span>`);

  const sections = [];
  if (r.ingredients) sections.push(`<div class="detail-section"><h3>מצרכים</h3><div class="content">${escapeHtml(r.ingredients)}</div></div>`);
  if (r.instructions) sections.push(`<div class="detail-section"><h3>אופן הכנה</h3><div class="content">${escapeHtml(r.instructions)}</div></div>`);
  if (r.notes) sections.push(`<div class="detail-section"><h3>הערות</h3><div class="content">${escapeHtml(r.notes)}</div></div>`);

  document.getElementById('detailBody').innerHTML = `
    ${img}
    <div class="detail-content">
      <div class="detail-title">
        ${escapeHtml(r.name)}
        ${r.favorite ? '<span class="fav-star">⭐</span>' : ''}
      </div>
      ${meta.length ? `<div class="detail-meta">${meta.join('')}</div>` : ''}
      ${sections.join('')}
    </div>`;

  openModal('modalRecipeDetail');
}

// ===== Recipe Form =====
function openRecipeForm(id = null) {
  state.editingRecipeId = id;
  state.currentPhotoData = null;

  const catSelect = document.getElementById('inputCategory');
  catSelect.innerHTML = state.data.categories.map(c =>
    `<option value="${c.id}">${escapeHtml(c.name)}</option>`
  ).join('');

  if (id) {
    const r = state.data.recipes.find(x => x.id === id);
    if (!r) return;
    document.getElementById('recipeFormTitle').textContent = 'עריכת מתכון';
    document.getElementById('inputName').value = r.name || '';
    document.getElementById('inputCategory').value = r.categoryId || '';
    document.getElementById('inputPrepTime').value = r.prepTime || '';
    document.getElementById('inputCookTime').value = r.cookTime || '';
    document.getElementById('inputServings').value = r.servings || '';
    document.getElementById('inputIngredients').value = r.ingredients || '';
    document.getElementById('inputInstructions').value = r.instructions || '';
    document.getElementById('inputNotes').value = r.notes || '';
    document.getElementById('inputFavorite').checked = !!r.favorite;
    if (r.image) {
      state.currentPhotoData = r.image;
      document.getElementById('photoPreview').src = r.image;
      document.getElementById('photoPreview').classList.remove('hidden');
      document.getElementById('photoPlaceholder').classList.add('hidden');
      document.getElementById('photoRemove').classList.remove('hidden');
    } else {
      resetPhotoInput();
    }
  } else {
    document.getElementById('recipeFormTitle').textContent = 'מתכון חדש';
    document.getElementById('inputName').value = '';
    document.getElementById('inputPrepTime').value = '';
    document.getElementById('inputCookTime').value = '';
    document.getElementById('inputServings').value = '';
    document.getElementById('inputIngredients').value = '';
    document.getElementById('inputInstructions').value = '';
    document.getElementById('inputNotes').value = '';
    document.getElementById('inputFavorite').checked = false;
    if (state.currentFilter !== 'all' && state.currentFilter !== 'favorites') {
      document.getElementById('inputCategory').value = state.currentFilter;
    }
    resetPhotoInput();
  }
  openModal('modalRecipeForm');
}

function resetPhotoInput() {
  state.currentPhotoData = null;
  document.getElementById('photoInput').value = '';
  document.getElementById('photoPreview').classList.add('hidden');
  document.getElementById('photoPreview').src = '';
  document.getElementById('photoPlaceholder').classList.remove('hidden');
  document.getElementById('photoRemove').classList.add('hidden');
}

function saveRecipe() {
  const name = document.getElementById('inputName').value.trim();
  const categoryId = document.getElementById('inputCategory').value;

  if (!name) { showToast('נא להזין שם מתכון'); return; }
  if (!categoryId) { showToast('נא לבחור פרק'); return; }

  const recipeData = {
    name,
    categoryId,
    prepTime: document.getElementById('inputPrepTime').value.trim(),
    cookTime: document.getElementById('inputCookTime').value.trim(),
    servings: document.getElementById('inputServings').value.trim(),
    ingredients: document.getElementById('inputIngredients').value.trim(),
    instructions: document.getElementById('inputInstructions').value.trim(),
    notes: document.getElementById('inputNotes').value.trim(),
    favorite: document.getElementById('inputFavorite').checked,
    image: state.currentPhotoData || null
  };

  if (state.editingRecipeId) {
    const idx = state.data.recipes.findIndex(r => r.id === state.editingRecipeId);
    if (idx >= 0) {
      state.data.recipes[idx] = { ...state.data.recipes[idx], ...recipeData };
    }
    showToast('המתכון עודכן');
  } else {
    state.data.recipes.push({
      id: uid(),
      ...recipeData,
      createdAt: Date.now()
    });
    showToast('המתכון נוסף');
  }

  saveData();
  closeModal('modalRecipeForm');
  renderRecipes();
}

function deleteCurrentRecipe() {
  const r = state.data.recipes.find(x => x.id === state.viewingRecipeId);
  if (!r) return;
  showConfirm({
    emoji: '🗑️',
    title: 'למחוק את המתכון?',
    message: `"${r.name}" יימחק לצמיתות`,
    onYes: () => {
      state.data.recipes = state.data.recipes.filter(x => x.id !== state.viewingRecipeId);
      saveData();
      closeModal('modalRecipeDetail');
      renderRecipes();
      showToast('המתכון נמחק');
    }
  });
}

// ===== Share & Print =====
function shareRecipe() {
  const r = state.data.recipes.find(x => x.id === state.viewingRecipeId);
  if (!r) return;
  let text = `📖 ${r.name}\n\n`;
  if (r.prepTime) text += `⏱️ זמן הכנה: ${r.prepTime}\n`;
  if (r.cookTime) text += `🔥 זמן בישול: ${r.cookTime}\n`;
  if (r.servings) text += `🍽️ ${r.servings}\n`;
  if (r.ingredients) text += `\n📝 מצרכים:\n${r.ingredients}\n`;
  if (r.instructions) text += `\n👩‍🍳 אופן הכנה:\n${r.instructions}\n`;
  if (r.notes) text += `\n💡 הערות:\n${r.notes}\n`;

  if (navigator.share) {
    navigator.share({ title: r.name, text }).catch(() => {});
  } else if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => showToast('המתכון הועתק'));
  } else {
    showToast('השיתוף אינו נתמך בדפדפן זה');
  }
}

function printRecipe() { window.print(); }

// ===== Categories =====
function openCategoryManager() {
  closeAllModals();
  renderCategoryList();
  openModal('modalCategories');
}

function renderCategoryList() {
  const list = document.getElementById('catList');
  if (state.data.categories.length === 0) {
    list.innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:16px">עדיין אין פרקים. הוסיפי את הראשון למטה 👇</p>';
    return;
  }
  list.innerHTML = state.data.categories.map((cat, idx) => {
    const count = state.data.recipes.filter(r => r.categoryId === cat.id).length;
    return `
      <div class="cat-item" data-id="${cat.id}">
        <div class="cat-actions">
          <button class="mini-btn" data-up ${idx === 0 ? 'disabled' : ''} title="העלה">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
          </button>
          <button class="mini-btn" data-down ${idx === state.data.categories.length - 1 ? 'disabled' : ''} title="הורד">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
        </div>
        <div class="cat-name">${escapeHtml(cat.name)}</div>
        <div class="cat-count">${count} מתכונים</div>
        <div class="cat-actions">
          <button class="mini-btn" data-edit title="עריכה">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
          <button class="mini-btn danger" data-delete title="מחיקה">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
          </button>
        </div>
      </div>`;
  }).join('');

  list.querySelectorAll('.cat-item').forEach(item => {
    const id = item.dataset.id;
    item.querySelector('[data-up]')?.addEventListener('click', () => moveCategory(id, -1));
    item.querySelector('[data-down]')?.addEventListener('click', () => moveCategory(id, 1));
    item.querySelector('[data-edit]')?.addEventListener('click', () => editCategory(id));
    item.querySelector('[data-delete]')?.addEventListener('click', () => deleteCategory(id));
  });
}

function addCategory() {
  const input = document.getElementById('newCatName');
  const name = input.value.trim();
  if (!name) { showToast('נא להזין שם'); return; }
  state.data.categories.push({ id: uid(), name });
  saveData();
  input.value = '';
  renderCategoryList();
  renderTabs();
  renderRecipes();
}

function editCategory(id) {
  const cat = state.data.categories.find(c => c.id === id);
  if (!cat) return;
  const newName = prompt('שם הפרק:', cat.name);
  if (newName === null) return;
  const trimmed = newName.trim();
  if (!trimmed) { showToast('שם לא יכול להיות ריק'); return; }
  cat.name = trimmed;
  saveData();
  renderCategoryList();
  renderTabs();
  renderRecipes();
  showToast('הפרק עודכן');
}

function deleteCategory(id) {
  const cat = state.data.categories.find(c => c.id === id);
  if (!cat) return;
  const count = state.data.recipes.filter(r => r.categoryId === id).length;
  if (count > 0) {
    showConfirm({
      emoji: '⚠️',
      title: `למחוק את הפרק "${cat.name}"?`,
      message: `הפרק מכיל ${count} מתכונים שיימחקו גם הם לצמיתות`,
      onYes: () => {
        state.data.recipes = state.data.recipes.filter(r => r.categoryId !== id);
        state.data.categories = state.data.categories.filter(c => c.id !== id);
        if (state.currentFilter === id) state.currentFilter = 'all';
        saveData();
        renderCategoryList();
        renderTabs();
        renderRecipes();
        showToast('הפרק נמחק');
      }
    });
  } else {
    showConfirm({
      emoji: '🗑️',
      title: `למחוק את הפרק "${cat.name}"?`,
      message: 'הפרק ריק ממילא',
      onYes: () => {
        state.data.categories = state.data.categories.filter(c => c.id !== id);
        if (state.currentFilter === id) state.currentFilter = 'all';
        saveData();
        renderCategoryList();
        renderTabs();
        renderRecipes();
        showToast('הפרק נמחק');
      }
    });
  }
}

function moveCategory(id, delta) {
  const idx = state.data.categories.findIndex(c => c.id === id);
  const newIdx = idx + delta;
  if (idx < 0 || newIdx < 0 || newIdx >= state.data.categories.length) return;
  [state.data.categories[idx], state.data.categories[newIdx]] =
    [state.data.categories[newIdx], state.data.categories[idx]];
  saveData();
  renderCategoryList();
  renderTabs();
}

// ===== Export / Import =====
function exportData() {
  const blob = new Blob([JSON.stringify(state.data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const date = new Date().toISOString().slice(0, 10);
  a.href = url;
  a.download = `recipe-book-backup-${date}.json`;
  a.click();
  URL.revokeObjectURL(url);
  closeModal('modalMenu');
  showToast('הקובץ הורד');
}

function importData(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.categories || !data.recipes) throw new Error('Invalid format');
      showConfirm({
        emoji: '📥',
        title: 'לייבא את הגיבוי?',
        message: `הקובץ מכיל ${data.categories.length} פרקים ו-${data.recipes.length} מתכונים. הנתונים הקיימים יוחלפו.`,
        onYes: () => {
          state.data = data;
          state.currentFilter = 'all';
          saveData();
          renderTabs();
          renderRecipes();
          closeModal('modalMenu');
          showToast('הגיבוי יובא בהצלחה');
        }
      });
    } catch (err) {
      showToast('קובץ לא תקין');
    }
  };
  reader.readAsText(file);
}

// ===== Confirm Dialog =====
function showConfirm({ emoji, title, message, onYes }) {
  document.getElementById('confirmEmoji').textContent = emoji || '❓';
  document.getElementById('confirmTitle').textContent = title || 'האם להמשיך?';
  document.getElementById('confirmMessage').textContent = message || '';
  state.confirmCallback = onYes;
  openModal('modalConfirm');
}

// ===== Event Listeners =====
document.addEventListener('DOMContentLoaded', () => {

  // Search
  document.getElementById('searchInput').addEventListener('input', (e) => {
    state.searchTerm = e.target.value;
    renderRecipes();
  });

  // Add recipe FAB
  document.getElementById('btnAddRecipe').addEventListener('click', () => {
    if (state.data.categories.length === 0) {
      showToast('צריך ליצור פרק לפני הוספת מתכון');
      openCategoryManager();
      return;
    }
    openRecipeForm();
  });

  // Menu
  document.getElementById('btnMenu').addEventListener('click', () => openModal('modalMenu'));
  document.getElementById('btnManageCategories').addEventListener('click', openCategoryManager);
  document.getElementById('btnExport').addEventListener('click', exportData);
  document.getElementById('btnImport').addEventListener('click', () => document.getElementById('importFile').click());
  document.getElementById('importFile').addEventListener('change', (e) => {
    if (e.target.files[0]) importData(e.target.files[0]);
    e.target.value = '';
  });

  // Categories
  document.getElementById('btnAddCat').addEventListener('click', addCategory);
  document.getElementById('newCatName').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') addCategory();
  });

  // Recipe form
  document.getElementById('btnSaveRecipe').addEventListener('click', saveRecipe);

  // Photo upload
  document.getElementById('photoInput').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    try {
      showToast('מעבד תמונה...');
      const dataUrl = await resizeImage(file);
      state.currentPhotoData = dataUrl;
      document.getElementById('photoPreview').src = dataUrl;
      document.getElementById('photoPreview').classList.remove('hidden');
      document.getElementById('photoPlaceholder').classList.add('hidden');
      document.getElementById('photoRemove').classList.remove('hidden');
    } catch (err) {
      showToast('שגיאה בטעינת תמונה');
    }
  });
  document.getElementById('photoRemove').addEventListener('click', (e) => {
    e.preventDefault();
    e.stopPropagation();
    resetPhotoInput();
  });

  // Recipe detail actions
  document.getElementById('btnEditRecipe').addEventListener('click', () => {
    closeModal('modalRecipeDetail');
    openRecipeForm(state.viewingRecipeId);
  });
  document.getElementById('btnDeleteRecipe').addEventListener('click', deleteCurrentRecipe);
  document.getElementById('btnPrintRecipe').addEventListener('click', printRecipe);
  document.getElementById('btnShareRecipe').addEventListener('click', shareRecipe);

  // Confirm dialog
  document.getElementById('confirmYes').addEventListener('click', () => {
    if (state.confirmCallback) state.confirmCallback();
    state.confirmCallback = null;
    closeModal('modalConfirm');
  });

  // Close buttons (any [data-close] closes nearest modal)
  document.querySelectorAll('[data-close]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      const modal = e.target.closest('.modal-overlay');
      if (modal) modal.classList.remove('active');
    });
  });

  // Click outside modal to close (only for non-fullscreen modals)
  document.querySelectorAll('.modal-overlay:not(.fullscreen)').forEach(overlay => {
    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) overlay.classList.remove('active');
    });
  });

  // Initial render
  renderTabs();
  renderRecipes();
});

// Expose for empty state button
window.openCategoryManager = openCategoryManager;
</script>
</body>
</html>
