<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<meta name="theme-color" content="#2c7a7b">
<title>ספר המתכונים שלי</title>
<style>
:root {
  --teal-dark: #234e52;
  --teal: #2c7a7b;
  --teal-light: #319795;
  --teal-soft: #b2f5ea;
  --teal-bg: #e6fffa;
  --white: #ffffff;
  --bg: #f7fafc;
  --card-bg: #ffffff;
  --text: #1a202c;
  --text-light: #4a5568;
  --text-muted: #718096;
  --border: #e2e8f0;
  --danger: #c53030;
  --danger-light: #fed7d7;
  --gold: #2c7a7b;
  --popular: #2c7a7b;
  --shadow: 0 2px 8px rgba(0,0,0,0.08);
  --shadow-lg: 0 10px 30px rgba(0,0,0,0.15);
  --radius: 12px;
  --radius-sm: 8px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Heebo", "Assistant", "Arial Hebrew", "David", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, textarea, select { font-family: inherit; font-size: 1rem; }

header {
  background: linear-gradient(135deg, var(--teal-dark), var(--teal));
  color: var(--white);
  padding: 16px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: var(--shadow);
}
.header-top { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.app-title { font-size: 1.3rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
.icon-btn {
  width: 40px; height: 40px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: var(--white); transition: background 0.2s;
  position: relative;
}
.icon-btn:hover, .icon-btn:active { background: rgba(255,255,255,0.15); }
.icon-btn svg { width: 22px; height: 22px; }
.search-box {
  margin-top: 12px; position: relative; display: flex; gap: 8px;
}
.search-box input {
  flex: 1; padding: 10px 40px 10px 12px;
  border-radius: var(--radius-sm);
  border: none; outline: none;
  background: rgba(255,255,255,0.95);
  color: var(--text);
}
.search-box::before {
  content: ''; position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
  width: 18px; height: 18px;
  background: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23718096' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><circle cx='11' cy='11' r='8'/><line x1='21' y1='21' x2='16.65' y2='16.65'/></svg>") no-repeat center;
  pointer-events: none;
}
.filter-btn {
  background: rgba(255,255,255,0.15); color: var(--white);
  padding: 0 14px; border-radius: var(--radius-sm);
  display: flex; align-items: center; gap: 6px;
  font-weight: 500; white-space: nowrap;
  transition: background 0.2s;
}
.filter-btn:hover { background: rgba(255,255,255,0.25); }
.filter-btn svg { width: 18px; height: 18px; }
.filter-btn .filter-count {
  background: #f56565; color: white;
  font-size: 0.75rem; font-weight: 700;
  padding: 1px 6px; border-radius: 10px;
  min-width: 18px; text-align: center;
}

.last-cooked-banner {
  background: linear-gradient(135deg, var(--teal-bg), #fff);
  border-right: 4px solid var(--teal);
  padding: 10px 14px;
  margin: 12px 16px 0;
  border-radius: var(--radius-sm);
  display: flex; align-items: center; gap: 10px;
  cursor: pointer;
  transition: transform 0.2s;
  box-shadow: var(--shadow);
}
.last-cooked-banner:hover { transform: translateX(-2px); }
.last-cooked-banner .label {
  font-size: 0.8rem; color: var(--text-muted);
}
.last-cooked-banner .recipe-name {
  font-weight: 600; color: var(--teal-dark);
}
.last-cooked-banner .date {
  font-size: 0.85rem; color: var(--text-light);
  margin-right: auto;
}

.tabs {
  background: var(--white); padding: 10px 12px;
  display: flex; gap: 8px; overflow-x: auto;
  border-bottom: 1px solid var(--border);
  scrollbar-width: thin;
}
.tabs::-webkit-scrollbar { height: 4px; }
.tabs::-webkit-scrollbar-thumb { background: var(--teal-soft); border-radius: 2px; }
.tab {
  padding: 8px 16px; border-radius: 20px;
  background: var(--bg); color: var(--text-light);
  white-space: nowrap; font-size: 0.95rem; font-weight: 500;
  transition: all 0.2s; border: 1px solid transparent;
}
.tab:hover { background: var(--teal-bg); }
.tab.active { background: var(--teal); color: var(--white); }
.tab.favorites-tab.active { background: var(--teal-dark); }

.active-filters {
  background: var(--teal-bg);
  padding: 8px 16px;
  display: none;
  align-items: center; gap: 8px; flex-wrap: wrap;
  border-bottom: 1px solid var(--teal-soft);
}
.active-filters.visible { display: flex; }
.active-filters-label { font-size: 0.85rem; font-weight: 600; color: var(--teal-dark); }
.filter-chip {
  background: var(--white); color: var(--teal-dark);
  padding: 4px 10px; border-radius: 16px;
  font-size: 0.85rem; font-weight: 500;
  display: inline-flex; align-items: center; gap: 6px;
  border: 1px solid var(--teal-soft);
}
.filter-chip .chip-remove {
  width: 16px; height: 16px; border-radius: 50%;
  background: var(--teal); color: white;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.7rem; cursor: pointer; line-height: 1;
}
.clear-all-btn {
  font-size: 0.85rem; color: var(--danger);
  text-decoration: underline; margin-right: auto;
}

main {
  padding: 16px; max-width: 1200px;
  margin: 0 auto; padding-bottom: 100px;
}
.results-info {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 12px;
  font-size: 0.9rem; color: var(--text-muted);
  flex-wrap: wrap; gap: 8px;
}
.sort-select {
  padding: 6px 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--white);
  font-size: 0.9rem;
  color: var(--text);
  cursor: pointer;
}

.recipe-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 16px;
}
@media (max-width: 500px) {
  .recipe-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
}
.recipe-card {
  background: var(--card-bg);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow);
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  position: relative;
}
.recipe-card:hover, .recipe-card:active {
  transform: translateY(-2px);
  box-shadow: var(--shadow-lg);
}
.recipe-img {
  width: 100%; aspect-ratio: 4/3;
  background: linear-gradient(135deg, var(--teal-soft), var(--teal-bg));
  object-fit: cover; display: block;
}
.recipe-img-placeholder {
  width: 100%; aspect-ratio: 4/3;
  background: linear-gradient(135deg, var(--teal-soft), var(--teal-bg));
  display: flex; align-items: center; justify-content: center;
  color: var(--teal); font-size: 3rem;
}
.recipe-info { padding: 12px; }
.recipe-name {
  font-weight: 600; font-size: 1rem;
  margin-bottom: 6px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  min-height: 2.8em;
}
.recipe-rating-row {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 4px;
  font-size: 0.85rem;
}
.recipe-stars {
  color: var(--gold);
  letter-spacing: -1px;
}
.recipe-stars-empty { color: var(--border); }
.recipe-cooked-count {
  color: var(--teal);
  font-size: 0.8rem;
  font-weight: 600;
}
.recipe-times {
  font-size: 0.8rem; color: var(--text-muted);
  display: flex; gap: 10px; flex-wrap: wrap;
  margin-bottom: 4px;
}
.recipe-card-tags {
  display: flex; gap: 4px; flex-wrap: wrap; margin-top: 6px;
}
.recipe-card-tag {
  font-size: 0.7rem;
  background: var(--teal-bg);
  color: var(--teal-dark);
  padding: 2px 8px;
  border-radius: 10px;
  font-weight: 500;
}
.recipe-card-tag.popular {
  background: var(--popular);
  color: white;
  font-weight: 700;
}
.recipe-badges {
  position: absolute; top: 8px; left: 8px;
  display: flex; flex-direction: column; gap: 4px;
}
.recipe-fav-badge, .recipe-popular-badge {
  background: rgba(255,255,255,0.95);
  border-radius: 50%;
  width: 34px; height: 34px;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 6px rgba(0,0,0,0.15);
  font-size: 1.1rem;
}
.recipe-fav-badge svg { width: 18px; height: 18px; fill: var(--teal); }

.empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
.empty-state .emoji { font-size: 4rem; margin-bottom: 16px; }
.empty-state h2 { color: var(--text); font-size: 1.3rem; margin-bottom: 8px; }
.empty-state p { margin-bottom: 20px; }

.btn {
  padding: 10px 20px; border-radius: var(--radius-sm);
  font-weight: 600; font-size: 0.95rem;
  transition: all 0.2s;
  display: inline-flex; align-items: center; justify-content: center;
  gap: 6px;
}
.btn-primary { background: var(--teal); color: var(--white); }
.btn-primary:hover { background: var(--teal-light); }
.btn-secondary { background: var(--bg); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { background: var(--teal-bg); }
.btn-danger { background: var(--danger); color: var(--white); }
.btn-danger:hover { opacity: 0.9; }

.fab {
  position: fixed; bottom: 20px; left: 20px;
  width: 56px; height: 56px; border-radius: 50%;
  background: var(--teal); color: var(--white);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 12px rgba(44,122,123,0.4);
  z-index: 50;
  transition: transform 0.2s;
}
.fab:hover, .fab:active { transform: scale(1.05); }
.fab svg { width: 28px; height: 28px; }

.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.5);
  display: none;
  align-items: center; justify-content: center;
  z-index: 200; padding: 16px;
  overflow-y: auto;
}
.modal-overlay.active { display: flex; }
.modal {
  background: var(--white);
  border-radius: var(--radius);
  max-width: 600px; width: 100%;
  max-height: 90vh;
  display: flex; flex-direction: column;
  overflow: hidden;
  box-shadow: var(--shadow-lg);
}
.modal-header {
  padding: 16px; border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
  background: var(--teal); color: var(--white);
}
.modal-header h2 { font-size: 1.2rem; font-weight: 600; }
.modal-header .icon-btn { color: var(--white); }
.modal-body { padding: 20px; overflow-y: auto; flex: 1; }
.modal-footer {
  padding: 16px; border-top: 1px solid var(--border);
  display: flex; gap: 10px; justify-content: flex-start;
  background: var(--bg);
}

.modal-overlay.fullscreen { padding: 0; background: var(--white); }
.modal-overlay.fullscreen .modal {
  max-width: 100%; width: 100%;
  max-height: 100vh; height: 100vh;
  border-radius: 0; box-shadow: none;
}

.form-group { margin-bottom: 16px; }
.form-group label {
  display: block; font-weight: 600; font-size: 0.9rem;
  margin-bottom: 6px; color: var(--text-light);
}
.form-group input, .form-group textarea, .form-group select {
  width: 100%; padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--white);
  outline: none;
  transition: border-color 0.2s;
}
.form-group input:focus, .form-group textarea:focus, .form-group select:focus {
  border-color: var(--teal);
  box-shadow: 0 0 0 3px rgba(44,122,123,0.1);
}
.form-group textarea { resize: vertical; min-height: 100px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
@media (max-width: 500px) { .form-row { grid-template-columns: 1fr; } }

.tags-container {
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 8px;
  background: var(--white);
  min-height: 46px;
  display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
}
.tags-container:focus-within {
  border-color: var(--teal);
  box-shadow: 0 0 0 3px rgba(44,122,123,0.1);
}
.tag-pill {
  background: var(--teal-bg);
  color: var(--teal-dark);
  padding: 4px 4px 4px 10px;
  border-radius: 14px;
  font-size: 0.9rem;
  display: inline-flex; align-items: center; gap: 4px;
  border: 1px solid var(--teal-soft);
}
.tag-pill .tag-remove {
  width: 20px; height: 20px;
  border-radius: 50%;
  background: var(--teal);
  color: white;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.8rem;
  cursor: pointer;
  line-height: 1;
}
.tags-input {
  border: none !important;
  outline: none !important;
  flex: 1; min-width: 120px;
  padding: 4px !important;
  box-shadow: none !important;
  font-size: 0.95rem;
}
.tag-suggestions {
  display: flex; flex-wrap: wrap; gap: 6px;
  margin-top: 8px;
}
.tag-suggestion {
  background: var(--bg);
  color: var(--text-light);
  padding: 4px 10px;
  border-radius: 14px;
  font-size: 0.85rem;
  border: 1px dashed var(--border);
  cursor: pointer;
  transition: all 0.2s;
}
.tag-suggestion:hover {
  background: var(--teal-bg);
  color: var(--teal-dark);
  border-color: var(--teal-soft);
  border-style: solid;
}
.tag-suggestions-label {
  font-size: 0.8rem;
  color: var(--text-muted);
  margin-top: 8px;
  margin-bottom: 4px;
}

.photo-upload {
  position: relative; width: 100%;
  aspect-ratio: 4/3;
  background: var(--teal-bg);
  border: 2px dashed var(--teal-light);
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  overflow: hidden;
}
.photo-upload input { display: none; }
.photo-upload img { width: 100%; height: 100%; object-fit: cover; }
.photo-upload .placeholder { text-align: center; color: var(--teal); }
.photo-upload .placeholder .emoji { font-size: 3rem; }
.photo-remove {
  position: absolute; top: 8px; left: 8px;
  background: var(--danger); color: var(--white);
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  box-shadow: var(--shadow);
}

.checkbox-group {
  display: flex; align-items: center; gap: 10px;
  padding: 10px; background: var(--bg);
  border-radius: var(--radius-sm); cursor: pointer;
}
.checkbox-group input { width: 20px; height: 20px; accent-color: var(--teal); }
.checkbox-group label { margin: 0; cursor: pointer; }

.star-rating-input {
  display: flex; gap: 4px; direction: ltr; justify-content: flex-end;
  padding: 8px; background: var(--bg);
  border-radius: var(--radius-sm);
}
.star-rating-input .star {
  font-size: 2rem; cursor: pointer;
  color: var(--border);
  transition: color 0.15s, transform 0.15s;
  user-select: none;
}
.star-rating-input .star.active { color: var(--gold); }
.star-rating-input .star:hover { transform: scale(1.15); }
.star-rating-input .clear-rating {
  font-size: 0.85rem;
  color: var(--text-muted);
  text-decoration: underline;
  align-self: center;
  margin-left: 10px;
  cursor: pointer;
  direction: rtl;
}

.detail-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 16px; background: var(--teal); color: var(--white);
  position: sticky; top: 0; z-index: 10;
}
.detail-header .actions { display: flex; gap: 4px; }
.detail-body { padding: 0; }

/* ====== IMAGE SIZE - MORE BALANCED ====== */
.detail-img-wrapper {
  width: 100%;
  max-width: 700px;
  margin: 0 auto;
  padding: 16px 16px 0;
}
.detail-img {
  width: 100%;
  max-height: 35vh;
  object-fit: cover;
  background: linear-gradient(135deg, var(--teal-soft), var(--teal-bg));
  display: block;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
}
.detail-img-placeholder {
  width: 100%;
  height: 220px;
  background: linear-gradient(135deg, var(--teal-soft), var(--teal-bg));
  display: flex; align-items: center; justify-content: center;
  font-size: 4rem; color: var(--teal);
  border-radius: var(--radius);
}
@media (max-width: 500px) {
  .detail-img { max-height: 30vh; }
  .detail-img-placeholder { height: 180px; }
}

.detail-content {
  padding: 20px 24px 24px;
  max-width: 900px;
  margin: 0 auto;
}
.detail-title {
  font-size: 1.6rem; font-weight: 700;
  color: var(--teal-dark);
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  margin-bottom: 12px;
}
@media (max-width: 500px) {
  .detail-title { font-size: 1.35rem; }
  .detail-content { padding: 16px; }
}
.fav-star { color: var(--teal); font-size: 1.5rem; }

.detail-rating {
  display: flex; align-items: center; gap: 10px;
  margin: 12px 0;
  padding: 12px;
  background: var(--bg);
  border-radius: var(--radius-sm);
  direction: ltr; justify-content: flex-end;
  flex-wrap: wrap;
}
.detail-rating-label {
  font-weight: 600; color: var(--text-light);
  direction: rtl;
  margin-left: auto;
}
.detail-rating .star-row { display: flex; gap: 4px; }
.detail-rating .star {
  font-size: 1.6rem; cursor: pointer;
  color: var(--border);
  transition: color 0.15s, transform 0.15s;
  user-select: none;
}
.detail-rating .star.active { color: var(--gold); }
.detail-rating .star:hover { transform: scale(1.15); }

/* ====== COOK TRACKER - BUTTON ON TOP NOW ====== */
.cook-tracker {
  margin: 12px 0;
  padding: 16px;
  background: linear-gradient(135deg, var(--teal-bg), #fff);
  border: 1px solid var(--teal-soft);
  border-radius: var(--radius-sm);
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.btn-cook-today {
  background: var(--teal);
  color: var(--white);
  padding: 14px 18px;
  border-radius: var(--radius-sm);
  font-weight: 700;
  font-size: 1.05rem;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  transition: all 0.2s;
  box-shadow: 0 2px 8px rgba(44,122,123,0.3);
}
.btn-cook-today:hover {
  background: var(--teal-light);
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(44,122,123,0.4);
}
.btn-cook-today.done {
  background: var(--teal-dark);
}
.cook-tracker .info-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  flex-wrap: wrap;
}
.cook-tracker .count-info {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.cook-tracker .count-value {
  font-weight: 700;
  color: var(--teal-dark);
  font-size: 1rem;
}
.cook-tracker .last-date {
  font-size: 0.85rem;
  color: var(--text-light);
}
.btn-view-history {
  font-size: 0.9rem;
  color: var(--teal);
  text-decoration: underline;
  cursor: pointer;
  background: none;
  border: none;
  font-weight: 600;
  padding: 4px 8px;
}
.btn-view-history:hover {
  background: var(--teal-bg);
  border-radius: var(--radius-sm);
}

.detail-meta {
  display: flex; gap: 16px; flex-wrap: wrap;
  margin: 16px 0 12px;
  padding: 14px; background: var(--teal-bg);
  border-radius: var(--radius-sm);
  color: var(--teal-dark); font-size: 0.95rem;
}
.detail-meta span { display: inline-flex; align-items: center; gap: 6px; }
.detail-tags {
  display: flex; flex-wrap: wrap; gap: 6px;
  margin-bottom: 24px;
}
.detail-tag {
  background: var(--white);
  color: var(--teal-dark);
  padding: 4px 12px;
  border-radius: 14px;
  font-size: 0.9rem;
  border: 1px solid var(--teal-soft);
  cursor: pointer;
  transition: all 0.2s;
}
.detail-tag:hover { background: var(--teal-bg); }
.detail-tag.popular {
  background: var(--popular); color: white;
  border-color: var(--popular);
  font-weight: 700;
}
.detail-section { margin-bottom: 28px; }
.detail-section h3 {
  font-size: 1.2rem; color: var(--teal-dark);
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 2px solid var(--teal-soft);
  display: flex; justify-content: space-between; align-items: center;
}
.detail-section .content {
  white-space: pre-wrap;
  line-height: 1.8;
  color: var(--text);
  font-size: 1.05rem;
}

.comments-list {

}

}
.comment-delete:hover { background: var(--danger-light); }

.history-list {

}
.history-delete {

}

.menu-items { display: flex; flex-direction: column; }

}
.menu-item:last-child { border-bottom: none; }

.cat-list { display: flex; flex-direction: column; gap: 8px; }

}
.cat-item .cat-name { flex: 1; font-weight: 500; }

}
.cat-item .mini-btn:hover { background: var(--teal-bg); color: var(--teal); }
.cat-item .mini-btn.danger:hover { background: var(--danger-light); color: var(--danger); }
.cat-item .mini-btn svg { width: 18px; height: 18px; }
.cat-item .mini-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.add-cat-form { display: flex; gap: 8px; margin-top: 12px; }
.add-cat-form input { flex: 1; }

.filter-section { margin-bottom: 20px; }
.filter-section h4 {

}
.filter-tags-list { display: flex; flex-wrap: wrap; gap: 6px; }
.filter-tag {

}
.filter-tag:hover { background: var(--teal-bg); }
.filter-tag.selected {

}
.time-slider-group { display: flex; align-items: center; gap: 10px; }
.time-slider-group input[type="number"] { width: 80px; }
.time-slider-label { color: var(--text-light); font-size: 0.9rem; }
.filter-star-row {
  display: flex; gap: 6px;
  direction: ltr; justify-content: flex-end;
}
.filter-star-row .f-star {
  font-size: 1.8rem; cursor: pointer;
  color: var(--border);
  user-select: none;
}
.filter-star-row .f-star.active { color: var(--gold); }

.confirm-modal { max-width: 400px; }
.confirm-body { padding: 24px 20px; text-align: center; }
.confirm-body .emoji { font-size: 3rem; margin-bottom: 12px; }
.confirm-body h3 { color: var(--text); font-size: 1.2rem; margin-bottom: 8px; }
.confirm-body p { color: var(--text-light); }

.toast {
  position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);

.hidden { display: none !important; }

@media print {

<script>
const STORAGE_KEY = 'recipeBookData_v1';
const POPULAR_THRESHOLD = 5;

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return { version: 2, categories: [], recipes: [] };
    const data = JSON.parse(raw);
    if (!data.categories) data.categories = [];
    if (!data.recipes) data.recipes = [];
    data.recipes.forEach(r => {
      if (!Array.isArray(r.tags)) r.tags = [];
      if (typeof r.rating !== 'number') r.rating = 0;
      if (!Array.isArray(r.cookHistory)) r.cookHistory = [];
      if (!Array.isArray(r.comments)) r.comments = [];
    });
    data.version = 2;
    return data;
  } catch (e) {
    console.error('Load error:', e);
    return { version: 2, categories: [], recipes: [] };
  }
}

function saveData() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state.data));
  } catch (e) {
    console.error('Save error:', e);
    showToast('שגיאה בשמירה - אולי אין מקום באחסון');
  }
}

const state = {
  data: loadData(),
  currentFilter: 'all',
  searchTerm: '',
  editingRecipeId: null,
  currentPhotoData: null,
  currentRating: 0,
  viewingRecipeId: null,
  confirmCallback: null,
  currentTags: [],
  activeFilters: { tags: [], maxPrepTime: null, maxCookTime: null, minRating: 0 },
  sortBy: 'dateNew'
};

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }
function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
function openModal(id) { document.getElementById(id).classList.add('active'); }
function closeModal(id) { document.getElementById(id).classList.remove('active'); }

function extractMinutes(timeText) {
  if (!timeText) return null;
  const match = String(timeText).match(/\d+/);
  return match ? parseInt(match[0], 10) : null;
}

function getAllTags() {
  const tagSet = new Set();
  state.data.recipes.forEach(r => {
    if (Array.isArray(r.tags)) r.tags.forEach(t => tagSet.add(t));
  });
  return Array.from(tagSet).sort((a, b) => a.localeCompare(b, 'he'));
}

function formatHebrewDate(timestamp) {
  const d = new Date(timestamp);
  const now = new Date();
  const diff = Math.floor((now - d) / (1000 * 60 * 60 * 24));
  if (diff === 0) return 'היום';
  if (diff === 1) return 'אתמול';
  if (diff < 7) return `לפני ${diff} ימים`;
  if (diff < 30) {
    const weeks = Math.floor(diff / 7);
    return weeks === 1 ? 'לפני שבוע' : `לפני ${weeks} שבועות`;
  }
  const day = String(d.getDate()).padStart(2, '0');
  const month = String(d.getMonth() + 1).padStart(2, '0');
  const year = d.getFullYear();
  return `${day}/${month}/${year}`;
}

function formatFullDate(timestamp) {
  const d = new Date(timestamp);
  const day = String(d.getDate()).padStart(2, '0');
  const month = String(d.getMonth() + 1).padStart(2, '0');
  const year = d.getFullYear();
  return `${day}/${month}/${year}`;
}

function isToday(timestamp) {
  const d = new Date(timestamp);
  const now = new Date();
  return d.getFullYear() === now.getFullYear() &&
         d.getMonth() === now.getMonth() &&
         d.getDate() === now.getDate();
}

function isPopular(recipe) {
  return Array.isArray(recipe.cookHistory) && recipe.cookHistory.length >= POPULAR_THRESHOLD;
}

function renderStars(rating) {
  let html = '';
  for (let i = 1; i <= 5; i++) {
    html += `<span class="${i <= rating ? 'recipe-stars' : 'recipe-stars-empty'}">★</span>`;
  }
  return html;
}

async function resizeImage(file, maxSize = 900, quality = 0.78) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const ratio = Math.min(maxSize / img.width, maxSize / img.height, 1);
        const canvas = document.createElement('canvas');
        canvas.width = Math.round(img.width * ratio);
        canvas.height = Math.round(img.height * ratio);
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function getFilteredRecipes() {
  let recipes = [...state.data.recipes];

  if (state.currentFilter === 'favorites') {
    recipes = recipes.filter(r => r.favorite);
  } else if (state.currentFilter !== 'all') {
    recipes = recipes.filter(r => r.categoryId === state.currentFilter);
  }

  if (state.searchTerm) {
    const q = state.searchTerm.toLowerCase();
    recipes = recipes.filter(r =>
      (r.name || '').toLowerCase().includes(q) ||
      (r.ingredients || '').toLowerCase().includes(q) ||
      (r.instructions || '').toLowerCase().includes(q) ||
      (r.notes || '').toLowerCase().includes(q) ||
      (Array.isArray(r.tags) && r.tags.some(t => t.toLowerCase().includes(q)))
    );
  }

  if (state.activeFilters.tags.length > 0) {
    recipes = recipes.filter(r =>
      Array.isArray(r.tags) && state.activeFilters.tags.every(t => r.tags.includes(t))
    );
  }

  if (state.activeFilters.minRating > 0) {
    recipes = recipes.filter(r => (r.rating || 0) >= state.activeFilters.minRating);
  }

  if (state.activeFilters.maxPrepTime) {
    recipes = recipes.filter(r => {
      const m = extractMinutes(r.prepTime);
      return m !== null && m <= state.activeFilters.maxPrepTime;
    });
  }
  if (state.activeFilters.maxCookTime) {
    recipes = recipes.filter(r => {
      const m = extractMinutes(r.cookTime);
      return m !== null && m <= state.activeFilters.maxCookTime;
    });
  }

  switch (state.sortBy) {
    case 'dateNew':
      recipes.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
      break;
    case 'dateOld':
      recipes.sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0));
      break;
    case 'alpha':
      recipes.sort((a, b) => (a.name || '').localeCompare(b.name || '', 'he'));
      break;
    case 'favFirst':
      recipes.sort((a, b) => {
        if (a.favorite && !b.favorite) return -1;
        if (!a.favorite && b.favorite) return 1;
        return (b.createdAt || 0) - (a.createdAt || 0);
      });
      break;
    case 'ratingHigh':
      recipes.sort((a, b) => (b.rating || 0) - (a.rating || 0) || (b.createdAt || 0) - (a.createdAt || 0));
      break;
    case 'mostCooked':
      recipes.sort((a, b) => {
        const ca = Array.isArray(a.cookHistory) ? a.cookHistory.length : 0;
        const cb = Array.isArray(b.cookHistory) ? b.cookHistory.length : 0;
        return cb - ca || (b.createdAt || 0) - (a.createdAt || 0);
      });
      break;
    case 'lastCooked':
      recipes.sort((a, b) => {
        const la = Array.isArray(a.cookHistory) && a.cookHistory.length ? Math.max(...a.cookHistory) : 0;
        const lb = Array.isArray(b.cookHistory) && b.cookHistory.length ? Math.max(...b.cookHistory) : 0;
        return lb - la || (b.createdAt || 0) - (a.createdAt || 0);
      });
      break;
  }

  return recipes;
}

      r.comments.push({
        id: uid(),
        author: author || 'אנונימי',
        text,
        date: Date.now()
      });
      saveData();
      showToast('התגובה נוספה');
      showRecipeDetail(id);
    };
  }

  body.querySelectorAll('.comment-delete').forEach(el => {
    el.onclick = () => {
      const idx = parseInt(el.dataset.commentIdx, 10);
      showConfirm({
        emoji: '🗑️',
        title: 'למחוק את התגובה?',
        message: '',
        onYes: () => {
          r.comments.splice(idx, 1);
          saveData();
          showRecipeDetail(id);
          showToast('התגובה נמחקה');
        }
      });
    };
  });

  openModal('modalRecipeDetail');
}

function showHistory(recipeId) {
  const r = state.data.recipes.find(x => x.id === recipeId);
  if (!r || !Array.isArray(r.cookHistory)) return;
  const sorted = [...r.cookHistory].sort((a, b) => b - a);
  const list = document.getElementById('historyList');
  if (sorted.length === 0) {
    list.innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:16px">עדיין לא בישלת את המתכון הזה</p>';
  } else {
    list.innerHTML = `
      <p style="margin-bottom:12px;color:var(--text-light)">בישלת את <strong>${escapeHtml(r.name)}</strong> סה"כ ${sorted.length} ${sorted.length === 1 ? 'פעם' : 'פעמים'}:</p>
      <div class="history-list">
        ${sorted.map(t => `
          <div class="history-item">
            <span class="history-date">🗓️ ${formatFullDate(t)} <span style="color:var(--text-muted);font-weight:normal">(${formatHebrewDate(t)})</span></span>
            <button class="history-delete" data-timestamp="${t}">מחק</button>
          </div>
        `).join('')}
      </div>`;
    list.querySelectorAll('.history-delete').forEach(el => {
      el.onclick = () => {
        const timestamp = parseInt(el.dataset.timestamp, 10);
        showConfirm({
          emoji: '🗑️',
          title: 'למחוק את הרישום?',
          message: formatFullDate(timestamp),
          onYes: () => {
            r.cookHistory = r.cookHistory.filter(t => t !== timestamp);
            saveData();
            showHistory(recipeId);
            showRecipeDetail(recipeId);
            renderRecipes();
            renderLastCookedBanner();
            showToast('הרישום נמחק');
          }
        });
      };
    });
  }
  openModal('modalHistory');
}

function renderFormTags() {
  const container = document.getElementById('tagsContainer');
  const input = document.getElementById('tagsInput');
  container.querySelectorAll('.tag-pill').forEach(el => el.remove());
  state.currentTags.forEach(tag => {
    const pill = document.createElement('span');
    pill.className = 'tag-pill';
    pill.innerHTML = `${escapeHtml(tag)} <span class="tag-remove" data-tag="${escapeHtml(tag)}">✕</span>`;
    pill.querySelector('.tag-remove').onclick = (e) => {
      e.stopPropagation();
      state.currentTags = state.currentTags.filter(t => t !== tag);
      renderFormTags();
      renderTagSuggestions();
    };
    container.insertBefore(pill, input);
  });
}

function addCurrentTag() {
  const input = document.getElementById('tagsInput');
  const value = input.value.trim();
  if (!value) return;
  if (!state.currentTags.includes(value)) {
    state.currentTags.push(value);
    renderFormTags();
    renderTagSuggestions();
  }
  input.value = '';
}

function renderTagSuggestions() {
  const allTags = getAllTags();
  const suggestions = allTags.filter(t => !state.currentTags.includes(t));
  const label = document.getElementById('tagSuggestionsLabel');
  const container = document.getElementById('tagSuggestions');
  if (suggestions.length === 0) {
    label.classList.add('hidden');
    container.innerHTML = '';
    return;
  }
  label.classList.remove('hidden');
  container.innerHTML = suggestions.map(t =>
    `<span class="tag-suggestion" data-tag="${escapeHtml(t)}">+ ${escapeHtml(t)}</span>`
  ).join('');
  container.querySelectorAll('.tag-suggestion').forEach(el => {
    el.onclick = () => {
      const tag = el.dataset.tag;
      if (!state.currentTags.includes(tag)) {
        state.currentTags.push(tag);
        renderFormTags();
        renderTagSuggestions();
      }
    };
  });
}

function renderFormStars() {
  const stars = document.querySelectorAll('#starRatingInput .star');
  stars.forEach(el => {
    const val = parseInt(el.dataset.value, 10);
    el.classList.toggle('active', val <= state.currentRating);
  });
}

function openRecipeForm(id = null) {
  state.editingRecipeId = id;
  state.currentPhotoData = null;
  state.currentTags = [];
  state.currentRating = 0;

  const catSelect = document.getElementById('inputCategory');
  catSelect.innerHTML = state.data.categories.map(c =>
    `<option value="${c.id}">${escapeHtml(c.name)}</option>`
  ).join('');

  if (id) {
    const r = state.data.recipes.find(x => x.id === id);
    if (!r) return;
    document.getElementById('recipeFormTitle').textContent = 'עריכת מתכון';
    document.getElementById('inputName').value = r.name || '';
    document.getElementById('inputCategory').value = r.categoryId || '';
    document.getElementById('inputPrepTime').value = r.prepTime || '';
    document.getElementById('inputCookTime').value = r.cookTime || '';
    document.getElementById('inputServings').value = r.servings || '';
    document.getElementById('inputIngredients').value = r.ingredients || '';
    document.getElementById('inputInstructions').value = r.instructions || '';
    document.getElementById('inputNotes').value = r.notes || '';
    document.getElementById('inputFavorite').checked = !!r.favorite;
    state.currentTags = Array.isArray(r.tags) ? [...r.tags] : [];
    state.currentRating = r.rating || 0;
    if (r.image) {
      state.currentPhotoData = r.image;
      document.getElementById('photoPreview').src = r.image;
      document.getElementById('photoPreview').classList.remove('hidden');
      document.getElementById('photoPlaceholder').classList.add('hidden');
      document.getElementById('photoRemove').classList.remove('hidden');
    } else {
      resetPhotoInput();
    }
  } else {
    document.getElementById('recipeFormTitle').textContent = 'מתכון חדש';
    document.getElementById('inputName').value = '';
    document.getElementById('inputPrepTime').value = '';
    document.getElementById('inputCookTime').value = '';
    document.getElementById('inputServings').value = '';
    document.getElementById('inputIngredients').value = '';
    document.getElementById('inputInstructions').value = '';
    document.getElementById('inputNotes').value = '';
    document.getElementById('inputFavorite').checked = false;
    if (state.currentFilter !== 'all' && state.currentFilter !== 'favorites') {
      document.getElementById('inputCategory').value = state.currentFilter;
    }
    resetPhotoInput();
  }
  document.getElementById('tagsInput').value = '';
  renderFormTags();
  renderTagSuggestions();
  renderFormStars();
  openModal('modalRecipeForm');
}

function resetPhotoInput() {
  state.currentPhotoData = null;
  document.getElementById('photoInput').value = '';
  document.getElementById('photoPreview').classList.add('hidden');
  document.getElementById('photoPreview').src = '';
  document.getElementById('photoPlaceholder').classList.remove('hidden');
  document.getElementById('photoRemove').classList.add('hidden');
}

function saveRecipe() {
  const name = document.getElementById('inputName').value.trim();
  const categoryId = document.getElementById('inputCategory').value;

  if (!name) { showToast('נא להזין שם מתכון'); return; }
  if (!categoryId) { showToast('נא לבחור פרק'); return; }

  const pendingTag = document.getElementById('tagsInput').value.trim();
  if (pendingTag && !state.currentTags.includes(pendingTag)) {
    state.currentTags.push(pendingTag);
  }

  const recipeData = {
    name,
    categoryId,
    prepTime: document.getElementById('inputPrepTime').value.trim(),
    cookTime: document.getElementById('inputCookTime').value.trim(),
    servings: document.getElementById('inputServings').value.trim(),
    ingredients: document.getElementById('inputIngredients').value.trim(),
    instructions: document.getElementById('inputInstructions').value.trim(),
    notes: document.getElementById('inputNotes').value.trim(),
    favorite: document.getElementById('inputFavorite').checked,
    image: state.currentPhotoData || null,
    tags: [...state.currentTags],
    rating: state.currentRating
  };

  if (state.editingRecipeId) {
    const idx = state.data.recipes.findIndex(r => r.id === state.editingRecipeId);
    if (idx >= 0) {
      state.data.recipes[idx] = { ...state.data.recipes[idx], ...recipeData };
    }
    showToast('המתכון עודכן');
  } else {
    state.data.recipes.push({
      id: uid(),
      ...recipeData,
      cookHistory: [],
      comments: [],
      createdAt: Date.now()
    });
    showToast('המתכון נוסף');
  }

  saveData();
  closeModal('modalRecipeForm');
  renderRecipes();
  renderLastCookedBanner();
}

function deleteCurrentRecipe() {
  const r = state.data.recipes.find(x => x.id === state.viewingRecipeId);
  if (!r) return;
  showConfirm({
    emoji: '🗑️',
    title: 'למחוק את המתכון?',
    message: `"${r.name}" יימחק לצמיתות`,
    onYes: () => {
      state.data.recipes = state.data.recipes.filter(x => x.id !== state.viewingRecipeId);
      saveData();
      closeModal('modalRecipeDetail');
      renderRecipes();
      renderLastCookedBanner();
      showToast('המתכון נמחק');
    }
  });
}

function shareRecipe() {
  const r = state.data.recipes.find(x => x.id === state.viewingRecipeId);
  if (!r) return;
  let text = `📖 ${r.name}\n\n`;
  if (r.rating > 0) text += `${'⭐'.repeat(r.rating)}\n`;
  if (r.prepTime) text += `⏱️ זמן הכנה: ${r.prepTime}\n`;
  if (r.cookTime) text += `🔥 זמן בישול: ${r.cookTime}\n`;
  if (r.servings) text += `🍽️ ${r.servings}\n`;
  if (Array.isArray(r.tags) && r.tags.length) text += `🏷️ ${r.tags.join(', ')}\n`;
  if (r.ingredients) text += `\n📝 מצרכים:\n${r.ingredients}\n`;
  if (r.instructions) text += `\n👩‍🍳 אופן הכנה:\n${r.instructions}\n`;
  if (r.notes) text += `\n💡 הערות:\n${r.notes}\n`;

  if (navigator.share) {
    navigator.share({ title: r.name, text }).catch(() => {});
  } else if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => showToast('המתכון הועתק'));
  } else {
    showToast('השיתוף אינו נתמך בדפדפן זה');
  }
}

function printRecipe() { window.print(); }

function openCategoryManager() {
  closeAllModals();
  renderCategoryList();
  openModal('modalCategories');
}

function renderCategoryList() {
  const list = document.getElementById('catList');
  if (state.data.categories.length === 0) {
    list.innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:16px">עדיין אין פרקים. הוסיפי את הראשון למטה 👇</p>';
    return;
  }
  list.innerHTML = state.data.categories.map((cat, idx) => {
    const count = state.data.recipes.filter(r => r.categoryId === cat.id).length;
    return `
      <div class="cat-item" data-id="${cat.id}">
        <div class="cat-actions">
          <button class="mini-btn" data-up ${idx === 0 ? 'disabled' : ''} title="העלה">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
          </button>
          <button class="mini-btn" data-down ${idx === state.data.categories.length - 1 ? 'disabled' : ''} title="הורד">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
        </div>
        <div class="cat-name">${escapeHtml(cat.name)}</div>
        <div class="cat-count">${count} מתכונים</div>
        <div class="cat-actions">
          <button class="mini-btn" data-edit title="עריכה">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
          <button class="mini-btn danger" data-delete title="מחיקה">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
          </button>
        </div>
      </div>`;
  }).join('');

  list.querySelectorAll('.cat-item').forEach(item => {
    const id = item.dataset.id;
    item.querySelector('[data-up]')?.addEventListener('click', () => moveCategory(id, -1));
    item.querySelector('[data-down]')?.addEventListener('click', () => moveCategory(id, 1));
    item.querySelector('[data-edit]')?.addEventListener('click', () => editCategory(id));
    item.querySelector('[data-delete]')?.addEventListener('click', () => deleteCategory(id));
  });
}

function addCategory() {
  const input = document.getElementById('newCatName');
  const name = input.value.trim();
  if (!name) { showToast('נא להזין שם'); return; }
  state.data.categories.push({ id: uid(), name });
  saveData();
  input.value = '';
  renderCategoryList();
  renderTabs();
  renderRecipes();
}

function editCategory(id) {
  const cat = state.data.categories.find(c => c.id === id);
  if (!cat) return;
  const newName = prompt('שם הפרק:', cat.name);
  if (newName === null) return;
  const trimmed = newName.trim();
  if (!trimmed) { showToast('שם לא יכול להיות ריק'); return; }
  cat.name = trimmed;
  saveData();
  renderCategoryList();
  renderTabs();
  renderRecipes();
  showToast('הפרק עודכן');
}

function deleteCategory(id) {
  const cat = state.data.categories.find(c => c.id === id);
  if (!cat) return;
  const count = state.data.recipes.filter(r => r.categoryId === id).length;
  if (count > 0) {
    showConfirm({
      emoji: '⚠️',
      title: `למחוק את הפרק "${cat.name}"?`,
      message: `הפרק מכיל ${count} מתכונים שיימחקו גם הם לצמיתות`,
      onYes: () => {
        state.data.recipes = state.data.recipes.filter(r => r.categoryId !== id);
        state.data.categories = state.data.categories.filter(c => c.id !== id);
        if (state.currentFilter === id) state.currentFilter = 'all';
        saveData();
        renderCategoryList();
        renderTabs();
        renderRecipes();
        renderLastCookedBanner();
        showToast('הפרק נמחק');
      }
    });
  } else {
    showConfirm({
      emoji: '🗑️',
      title: `למחוק את הפרק "${cat.name}"?`,
      message: 'הפרק ריק ממילא',
      onYes: () => {
        state.data.categories = state.data.categories.filter(c => c.id !== id);
        if (state.currentFilter === id) state.currentFilter = 'all';
        saveData();
        renderCategoryList();
        renderTabs();
        renderRecipes();
        showToast('הפרק נמחק');
      }
    });
  }
}

function moveCategory(id, delta) {
  const idx = state.data.categories.findIndex(c => c.id === id);
  const newIdx = idx + delta;
  if (idx < 0 || newIdx < 0 || newIdx >= state.data.categories.length) return;
  [state.data.categories[idx], state.data.categories[newIdx]] =
    [state.data.categories[newIdx], state.data.categories[idx]];
  saveData();
  renderCategoryList();
  renderTabs();
}

function openFilterModal() {
  document.querySelectorAll('#filterStarRow .f-star').forEach(el => {
    const val = parseInt(el.dataset.value, 10);
    el.classList.toggle('active', val <= state.activeFilters.minRating);
  });

  const allTags = getAllTags();
  const list = document.getElementById('filterTagsList');
  if (allTags.length === 0) {
    list.innerHTML = '<p style="color:var(--text-muted);font-size:0.9rem">עדיין אין תגיות. הוסיפי תגיות למתכונים כדי לסנן לפיהן.</p>';
  } else {
    list.innerHTML = allTags.map(t =>
      `<span class="filter-tag ${state.activeFilters.tags.includes(t) ? 'selected' : ''}" data-tag="${escapeHtml(t)}">${escapeHtml(t)}</span>`
    ).join('');
    list.querySelectorAll('.filter-tag').forEach(el => {
      el.onclick = () => el.classList.toggle('selected');
    });
  }
  document.getElementById('filterMaxPrepTime').value = state.activeFilters.maxPrepTime || '';
  document.getElementById('filterMaxCookTime').value = state.activeFilters.maxCookTime || '';
  openModal('modalFilter');
}

function applyFilterFromModal() {
  const selectedTags = [];
  document.querySelectorAll('#filterTagsList .filter-tag.selected').forEach(el => {
    selectedTags.push(el.dataset.tag);
  });
  const maxPrep = parseInt(document.getElementById('filterMaxPrepTime').value, 10);
  const maxCook = parseInt(document.getElementById('filterMaxCookTime').value, 10);
  state.activeFilters.tags = selectedTags;
  state.activeFilters.maxPrepTime = !isNaN(maxPrep) && maxPrep > 0 ? maxPrep : null;
  state.activeFilters.maxCookTime = !isNaN(maxCook) && maxCook > 0 ? maxCook : null;
  closeModal('modalFilter');
  updateFilterUI();
}

function resetFilterModal() {
  document.querySelectorAll('#filterTagsList .filter-tag.selected').forEach(el => el.classList.remove('selected'));
  document.querySelectorAll('#filterStarRow .f-star').forEach(el => el.classList.remove('active'));
  state.activeFilters.minRating = 0;
  document.getElementById('filterMaxPrepTime').value = '';
  document.getElementById('filterMaxCookTime').value = '';
}

function exportData() {
  const blob = new Blob([JSON.stringify(state.data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const date = new Date().toISOString().slice(0, 10);
  a.href = url;
  a.download = `recipe-book-backup-${date}.json`;
  a.click();
  URL.revokeObjectURL(url);
  closeModal('modalMenu');
  showToast('הקובץ הורד');
}

function importData(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.categories || !data.recipes) throw new Error('Invalid format');
      showConfirm({
        emoji: '📥',
        title: 'לייבא את הגיבוי?',
        message: `הקובץ מכיל ${data.categories.length} פרקים ו-${data.recipes.length} מתכונים. הנתונים הקיימים יוחלפו.`,
        onYes: () => {
          data.recipes.forEach(r => {
            if (!Array.isArray(r.tags)) r.tags = [];
            if (typeof r.rating !== 'number') r.rating = 0;
            if (!Array.isArray(r.cookHistory)) r.cookHistory = [];
            if (!Array.isArray(r.comments)) r.comments = [];
          });
          state.data = data;
          state.currentFilter = 'all';
          clearAllFilters();
          saveData();
          renderTabs();
          renderRecipes();
          renderLastCookedBanner();
          closeModal('modalMenu');
          showToast('הגיבוי יובא בהצלחה');
        }
      });
    } catch (err) {
      showToast('קובץ לא תקין');
    }
  };
  reader.readAsText(file);
}

function showConfirm({ emoji, title, message, onYes }) {
  document.getElementById('confirmEmoji').textContent = emoji || '❓';
  document.getElementById('confirmTitle').textContent = title || 'האם להמשיך?';
  document.getElementById('confirmMessage').textContent = message || '';
  state.confirmCallback = onYes;
  openModal('modalConfirm');
}

document.addEventListener('DOMContentLoaded', () => {

  document.getElementById('searchInput').addEventListener('input', (e) => {
    state.searchTerm = e.target.value;
    renderRecipes();
  });

  document.getElementById('btnFilter').addEventListener('click', openFilterModal);
  document.getElementById('btnApplyFilter').addEventListener('click', applyFilterFromModal);
  document.getElementById('btnResetFilter').addEventListener('click', resetFilterModal);

  document.querySelectorAll('#filterStarRow .f-star').forEach(el => {
    el.addEventListener('click', () => {
      const val = parseInt(el.dataset.value, 10);
      state.activeFilters.minRating = (state.activeFilters.minRating === val) ? 0 : val;
      document.querySelectorAll('#filterStarRow .f-star').forEach(s => {
        const v = parseInt(s.dataset.value, 10);
        s.classList.toggle('active', v <= state.activeFilters.minRating);
      });
    });
  });

  document.getElementById('btnAddRecipe').addEventListener('click', () => {
    if (state.data.categories.length === 0) {
      showToast('צריך ליצור פרק לפני הוספת מתכון');
      openCategoryManager();
      return;
    }
    openRecipeForm();
  });

  document.getElementById('btnMenu').addEventListener('click', () => openModal('modalMenu'));
  document.getElementById('btnManageCategories').addEventListener('click', openCategoryManager);
  document.getElementById('btnExport').addEventListener('click', exportData);
  document.getElementById('btnImport').addEventListener('click', () => document.getElementById('importFile').click());
  document.getElementById('importFile').addEventListener('change', (e) => {
    if (e.target.files[0]) importData(e.target.files[0]);
    e.target.value = '';
  });

  document.getElementById('btnAddCat').addEventListener('click', addCategory);
  document.getElementById('newCatName').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') addCategory();
  });

  document.getElementById('btnSaveRecipe').addEventListener('click', saveRecipe);

  document.querySelectorAll('#starRatingInput .star').forEach(el => {
    el.addEventListener('click', () => {
      const val = parseInt(el.dataset.value, 10);
      state.currentRating = (state.currentRating === val) ? 0 : val;
      renderFormStars();
    });
  });
  document.getElementById('clearRating').addEventListener('click', () => {
    state.currentRating = 0;
    renderFormStars();
  });

  const tagsInput = document.getElementById('tagsInput');
  tagsInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ',') {
      e.preventDefault();
      addCurrentTag();
    } else if (e.key === 'Backspace' && !tagsInput.value && state.currentTags.length > 0) {
      state.currentTags.pop();
      renderFormTags();
      renderTagSuggestions();
    }
  });
  document.getElementById('tagsContainer').addEventListener('click', (e) => {
    if (e.target === document.getElementById('tagsContainer')) tagsInput.focus();
  });

  document.getElementById('photoInput').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    try {
      showToast('מעבד תמונה...');
      const dataUrl = await resizeImage(file);
      state.currentPhotoData = dataUrl;
      document.getElementById('photoPreview').src = dataUrl;
      document.getElementById('photoPreview').classList.remove('hidden');
      document.getElementById('photoPlaceholder').classList.add('hidden');
      document.getElementById('photoRemove').classList.remove('hidden');
    } catch (err) {
      showToast('שגיאה בטעינת תמונה');
    }
  });
  document.getElementById('photoRemove').addEventListener('click', (e) => {
    e.preventDefault();
    e.stopPropagation();
    resetPhotoInput();
  });

  document.getElementById('btnEditRecipe').addEventListener('click', () => {
    closeModal('modalRecipeDetail');
    openRecipeForm(state.viewingRecipeId);
  });
  document.getElementById('btnDeleteRecipe').addEventListener('click', deleteCurrentRecipe);
  document.getElementById('btnPrintRecipe').addEventListener('click', printRecipe);
  document.getElementById('btnShareRecipe').addEventListener('click', shareRecipe);

  document.getElementById('confirmYes').addEventListener('click', () => {
    if (state.confirmCallback) state.confirmCallback();
    state.confirmCallback = null;
    closeModal('modalConfirm');
  });

  document.querySelectorAll('[data-close]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      const modal = e.target.closest('.modal-overlay');
      if (modal) modal.classList.remove('active');
    });
  });

  document.querySelectorAll('.modal-overlay:not(.fullscreen)').forEach(overlay => {
    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) overlay.classList.remove('active');
    });
  });

  renderTabs();
  renderActiveFilters();
  renderLastCookedBanner();
  renderRecipes();
});

window.openCategoryManager = openCategoryManager;
</script>
</body>
</html>
